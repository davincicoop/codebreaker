function render() {
  const s = state;

  // For peg placement actions during an active game, do a targeted update of only
  // the active row and controls — never touching .board-area or its scrollTop.
  // This is the definitive fix for scroll jumping on color peg taps.
  if (
    s.status === 'in-progress' &&
    (lastAction === 'PLACE_COLOR' || lastAction === 'SELECT_SLOT' || lastAction === 'CLEAR_SLOT' || lastAction === 'CLEAR_ROW')
  ) {
    // Re-render just the active row in place
    const activeRowEl = document.querySelector('.guess-row.state-active');
    if (activeRowEl) {
      const rowIndex = parseInt(activeRowEl.dataset.row);
      activeRowEl.outerHTML = buildGuessRow(rowIndex, 'active', s.activeRow.slots, null, s.activeRow.selectedSlotIndex);
    }
    // Update submit button enabled state
    const submitBtn = document.querySelector('.submit-btn');
    if (submitBtn) {
      const ready = isRowComplete(s.activeRow.slots);
      submitBtn.disabled = !ready;
      submitBtn.setAttribute('aria-label', ready ? 'Submit guess' : 'Submit guess, fill all slots first');
    }
    // Update palette peg availability
    const available = getAvailableColors(s.activeRow.slots, effectiveAllowDuplicates(s.settings));
    document.querySelectorAll('.palette-peg-wrap').forEach((el, i) => {
      const cid = COLOR_IDS[i];
      const avail = available.includes(cid);
      el.classList.toggle('unavailable', !avail);
      el.setAttribute('tabindex', avail ? '0' : '-1');
      el.setAttribute('aria-label', avail ? 'Place ' + COLOR_NAMES[cid] : 'Place ' + COLOR_NAMES[cid] + ', already used');
    });
    lastAction = null;
    return;
  }

  let html = '';
  switch (s.status) {
    case 'setup':       html = renderSetupScreen(s.settings); break;
    case 'code-entry':  html = renderCodeEntryScreen(s.settings); break;
    case 'handoff':     html = renderHandoffScreen(); break;
    default:            html = renderGameScreen(s); break;
  }
  // For full re-renders (submit, new game, etc.) preserve board-area scroll position.
  const boardArea = document.querySelector('.board-area');
  const savedScroll = boardArea ? boardArea.scrollTop : 0;
  document.getElementById('app').innerHTML = html;
  const newBoardArea = document.querySelector('.board-area');
  if (newBoardArea) newBoardArea.scrollTop = savedScroll;

  // After render, trigger feedback animations on the last completed row
  if (s.status === 'in-progress' && s.completedRows.length > 0) {
    const lastIdx = s.completedRows.length - 1;
    const lastRow = document.querySelector(`.guess-row[data-row="${lastIdx}"]`);
    if (lastRow && !lastRow.dataset.fbAnimated) {
      lastRow.dataset.fbAnimated = '1';
      triggerFeedbackAnimation(lastRow);
    }
  }
  if ((s.status === 'won' || s.status === 'lost') && s.completedRows.length > 0) {
    const lastIdx = s.completedRows.length - 1;
    const lastRow = document.querySelector(`.guess-row[data-row="${lastIdx}"]`);
    if (lastRow) triggerFeedbackAnimation(lastRow);
  }
}

// =============================================
// EVENT HANDLERS
// =============================================
function updateSetting(key, value) {
  dispatch({ type: 'UPDATE_SETTINGS', payload: { [key]: value } });
}

function handleSlotTap(idx) {
  dispatch({ type: 'SELECT_SLOT', payload: { index: idx } });
}

// Code entry local state
function ceSlotTap(idx) {
  const slots = window._ceSlots;
  if (slots[idx] !== null) {
    window._ceSlots = [...slots]; window._ceSlots[idx] = null;
    window._ceSelected = idx;
  } else {
    window._ceSelected = idx;
  }
  render();
}

function cePaletteTap(colorId) {
  const selIdx = window._ceSelected;
  if (selIdx === null) return;
  const slots = [...window._ceSlots];
  slots[selIdx] = colorId;
  // Advance
  let next = null;
  for (let i = selIdx + 1; i < 4; i++) { if (slots[i] === null) { next = i; break; } }
  if (next === null) { for (let i = 0; i < selIdx; i++) { if (slots[i] === null) { next = i; break; } } }
  window._ceSlots = slots;
  window._ceSelected = next;
  render();
}

function ceClear() {
  window._ceSlots = [null,null,null,null];
  window._ceSelected = 0;
  render();
}

function ceConfirm() {
  if (!isRowComplete(window._ceSlots)) return;
  const code = [...window._ceSlots];
  window._ceSlots = [null,null,null,null];
  window._ceSelected = 0;
  dispatch({ type: 'CONFIRM_CODE', payload: code });
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (state.status !== 'in-progress') return;
  const { activeRow, settings } = state;
  const selIdx = activeRow.selectedSlotIndex;

  if (e.key === 'Enter') { if (isRowComplete(activeRow.slots)) dispatch({ type: 'SUBMIT_GUESS' }); return; }
  if (e.key === 'Backspace' || e.key === 'Delete') {
    if (selIdx !== null && activeRow.slots[selIdx] !== null) {
      dispatch({ type: 'CLEAR_SLOT', payload: { index: selIdx } });
    }
    return;
  }
  // Arrow navigation
  if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    const cur = selIdx !== null ? selIdx : 0;
    const next = Math.max(0, Math.min(3, cur + dir));
    dispatch({ type: 'SELECT_SLOT', payload: { index: next } });
    e.preventDefault();
    return;
  }
  // Number keys 1-6 to place colors
  const num = parseInt(e.key);
  if (num >= 1 && num <= 6) {
    const available = getAvailableColors(activeRow.slots, effectiveAllowDuplicates(settings));
    if (available.includes(num) && selIdx !== null) {
      dispatch({ type: 'PLACE_COLOR', payload: { colorId: num } });
    }
  }
});

// =============================================
// ADVANCED SETTINGS ACCORDION
// =============================================
function toggleAdvancedSettings() {
  window._advancedOpen = !window._advancedOpen;
  const body = document.getElementById('advanced-settings-body');
  const header = document.getElementById('advanced-settings-header');
  if (body && header) {

// =============================================
// GAME STATE PERSISTENCE
// Spec: spec-codebreaker-persistence
// Persists active game state to localStorage so a page refresh
// restores the exact game in progress. Settings use a separate
// key (codebreaker_settings) and are unaffected.
// =============================================

const GAME_STATE_KEY = 'codebreaker_game_state';

// =============================================
// DAILY CHALLENGE LOCKOUT & PERSISTENCE
// Daily games use a separate, variant+date-keyed localStorage entry so they
// persist independently of the generic game state and survive NEW_GAME.
// See: spec-codebreaker-daily-lockout
// =============================================

// Build the localStorage key for a daily challenge.
// Variant is derived from dailyGameMode: 'dup' or 'nodup'.
function getDailyKey(dateStr, dailyGameMode) {
  const variant = dailyGameMode === 'dup' ? 'dupes' : 'nodupes';
  return `codebreaker-daily-${dateStr}-${variant}`;
}

// Save the current daily challenge state to its variant+date key.
// Called from saveGameState when mode is daily.
function saveDailyState(s) {
  try {
    if (s.settings.gameMode !== 'daily') return;
    if (!['in-progress', 'won', 'lost'].includes(s.status)) return;

    const dateStr = s.settings.dailyPuzzleDate || getTodayDateString();
    const key = getDailyKey(dateStr, s.settings.dailyGameMode);

    const payload = {
      date: dateStr,
      variant: s.settings.dailyGameMode,
      secretCode: s.secretCode,
      guesses: (s.completedRows || []).map(r => r.guess),
      feedback: (s.completedRows || []).map(r => r.feedback),
      status: s.status,
      puzzleNumber: s.puzzleNumber || null,
      settings: {
        allowDuplicates: s.settings.allowDuplicates,
        maxAttempts: s.settings.maxAttempts,
        colorblindMode: s.settings.colorblindMode,
        dailyGameMode: s.settings.dailyGameMode,
        dailyPuzzleDate: dateStr
      }
    };

    localStorage.setItem(key, JSON.stringify(payload));
  } catch (_) {
    // Silent degrade
  }
}

// Attempt to restore a saved daily challenge for a given date and variant.
// Returns the parsed payload if valid, or null.
function loadDailyState(dateStr, dailyGameMode) {
  try {
    const key = getDailyKey(dateStr, dailyGameMode);
    const raw = localStorage.getItem(key);
    if (!raw) return null;

    const p = JSON.parse(raw);

    // Validate required fields
    if (!p || p.date !== dateStr || p.variant !== dailyGameMode) return null;
    if (!p.secretCode || !Array.isArray(p.guesses) || !Array.isArray(p.feedback)) return null;
    if (!['in-progress', 'won', 'lost'].includes(p.status)) return null;

    return p;
  } catch (_) {
    return null;
  }
}

// Derive mode string from settings (mirrors START_GAME logic)
function getModeFromState(s) {
  return s.settings.gameMode === 'daily' ? 'daily'
       : s.settings.gameMode === 'two-player' ? 'two-player'
       : 'single';
}

// Save current game state to localStorage.
// Async because Two Player handoff requires SHA-256 hashing.
// Silent-fails if localStorage is unavailable.
async function saveGameState(s) {
  try {
    // Only persist in-progress, won, or lost states.
    // 'setup', 'code-entry' phases have nothing worth restoring.
    if (s.status === 'setup') return;

    const mode = getModeFromState(s);
    const today = getTodayDateString();
    let secretCode = null;
    let secretCodeHash = null;
    let twoPlayerPhase = null;

    if (mode === 'two-player') {
      if (s.status === 'handoff') {
        // At handoff screen: store hash only, never plaintext
        twoPlayerPhase = 'handoff';
        secretCode = null;
        if (s.secretCode) {
          const encoded = new TextEncoder().encode(s.secretCode.join(','));
          const hashBuf = await crypto.subtle.digest('SHA-256', encoded);
          const hashArr = Array.from(new Uint8Array(hashBuf));
          secretCodeHash = hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
        }
      } else if (s.status === 'in-progress' || s.status === 'won' || s.status === 'lost') {
        // Codebreaker phase: plaintext is safe (used only for feedback calculation)
        twoPlayerPhase = 'guessing';
        secretCode = s.secretCode;
        secretCodeHash = null;
      } else {
        // code-entry phase — don't persist
        return;
      }
    } else {
      secretCode = s.secretCode;
    }

    const payload = {
      mode,
      savedDate: today,
      date: mode === 'daily' ? (s.settings.dailyPuzzleDate || today) : null,
      settings: {
        allowDuplicates: s.settings.allowDuplicates,
        maxAttempts: s.settings.maxAttempts,
        colorblindMode: s.settings.colorblindMode,
        gameMode: s.settings.gameMode,
        dailyGameMode: s.settings.dailyGameMode || 'nodup',
        dailyPuzzleDate: s.settings.dailyPuzzleDate || today
      },
      secretCode,
      secretCodeHash,
      twoPlayerPhase,
      submittedRows: s.completedRows.map(r => ({
        guesses: r.guess,
        feedback: r.feedback
      })),
      activeRowPegs: s.activeRow ? [...s.activeRow.slots] : [null,null,null,null],
      gameComplete: s.status === 'won' || s.status === 'lost',
      status: s.status,
      puzzleNumber: s.puzzleNumber || null,
      attemptNumber: s.attemptNumber || 1
    };

    localStorage.setItem(GAME_STATE_KEY, JSON.stringify(payload));

    // Also write to the daily-specific key so daily state survives NEW_GAME
    // and is keyed by date+variant independently.
    // See: spec-codebreaker-daily-lockout §3.1
    if (mode === 'daily') saveDailyState(s);
  } catch (_) {
    // Silent degrade — localStorage unavailable or crypto error
  }
}

// Clear the persisted game state entry.
function clearGameState() {
  try {
    localStorage.removeItem(GAME_STATE_KEY);
  } catch (_) {}
}

// Validate that a parsed payload has the required fields.
function isValidSavedState(p) {
  return p
    && typeof p.mode === 'string'
    && typeof p.savedDate === 'string'
    && p.settings && typeof p.settings.maxAttempts === 'number'
    && Array.isArray(p.submittedRows)
    && Array.isArray(p.activeRowPegs)
    && typeof p.gameComplete === 'boolean';
}

// Attempt to restore a saved game state on page load.
// Returns true if a game was restored, false if starting fresh.
function restoreGameState() {
  try {
    const raw = localStorage.getItem(GAME_STATE_KEY);
    if (!raw) return false;

    const p = JSON.parse(raw);
    if (!isValidSavedState(p)) { clearGameState(); return false; }

    // Midnight expiry: if savedDate differs from today, discard.
    const today = getTodayDateString();
    if (p.savedDate !== today) { clearGameState(); return false; }

    // Two Player handoff-phase restore: we cannot reconstruct the plaintext
    // code from the hash, so restart the codemaker phase with an explanation.
    if (p.mode === 'two-player' && p.twoPlayerPhase === 'handoff') {
      clearGameState();
      // Hydrate settings so game mode is correct, then show an interrupted notice
      const restoredSettings = { ...DEFAULT_SETTINGS, ...p.settings };
      state = { ...createInitialState(), settings: restoredSettings };
      applyColorblindMode(state.settings.colorblindMode);
      // Show a one-time toast after first render
      window._showInterruptedNotice = true;
      return false; // fall through to normal setup render
    }

    // Reconstruct completedRows in internal format
    const completedRows = (p.submittedRows || []).map(r => ({
      guess: r.guesses,
      feedback: r.feedback
    }));

    const restoredSettings = { ...DEFAULT_SETTINGS, ...p.settings };
    applyColorblindMode(restoredSettings.colorblindMode);

    // Determine status to restore
    let status = p.status || 'in-progress';
    // Guard: only restore valid statuses
    if (!['in-progress','won','lost','handoff'].includes(status)) status = 'in-progress';

    state = {
      status,
      settings: restoredSettings,
      secretCode: p.secretCode || null,
      dailyPuzzleCode: p.mode === 'daily' ? p.secretCode : null,
      puzzleNumber: p.puzzleNumber || null,
      completedRows,
      activeRow: {
        slots: p.activeRowPegs || [null,null,null,null],
        selectedSlotIndex: (status === 'in-progress') ? (p.activeRowPegs || []).findIndex(v => v === null) : null
      },
      attemptNumber: p.attemptNumber || (completedRows.length + 1)
    };

    // If game was completed, re-show the result overlay after render
    if (p.gameComplete && (status === 'won' || status === 'lost')) {
      window._restoreResultOverlay = state;
    }

    return true;
  } catch (_) {
    clearGameState();
    return false;
  }
}

// =============================================
// INIT
// =============================================
restoreGameState();
render();

// Post-render hooks for restored states
if (window._showInterruptedNotice) {
  window._showInterruptedNotice = false;
  setTimeout(() => {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:#e8dcc8;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;text-align:center;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,0.4);border:1px solid #c8a96e44;';
    toast.textContent = 'Your session was interrupted. Please set the code again.';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }, 300);
}
if (window._restoreResultOverlay) {
  const s = window._restoreResultOverlay;
  window._restoreResultOverlay = null;
  setTimeout(() => {
    revealSecretCode(s.status === 'won' ? 'win' : 'loss');
    showResultOverlay(s);
  }, 200);
}
</script>
