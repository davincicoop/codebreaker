<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CodeBreaker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================
   DESIGN TOKENS
   ============================================= */
:root {
  --color-1: #E63946;
  --color-2: #F4D03F;
  --color-3: #2E86AB;
  --color-4: #2ECC71;
  --color-5: #E67E22;
  --color-6: #9B59B6;

  --feedback-black: #1a1a1a;
  --feedback-white: #f0f0f0;
  --feedback-empty: #3a3a3a;

  --bg-app: #0f0d0b;
  --bg-board: #181310;
  --bg-row-active: #2a2018;
  --bg-row-completed: #1c1610;
  --bg-row-empty: #141009;
  --bg-controls: #0f0d0b;

  --slot-empty-fill: #241c15;
  --slot-empty-border: #3a2e24;
  --slot-selected-ring: #c8a96e;

  --font-display: 'Cinzel', serif;
  --font-ui: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;

  --text-primary: #f0ebe4;
  --text-secondary: #8a7f78;
  --text-disabled: #4a4540;

  --color-accent: #c8a96e;
  --color-submit: #c8a96e;
  --color-submit-disabled: #2a2520;

  --row-gap: 7px;
  --slot-gap: 10px;
  --board-padding: 16px;
  --controls-height: 128px;

  --radius-peg: 50%;
  --radius-row: 10px;
  --radius-button: 8px;

  --shadow-slot-inset: inset 0 3px 6px rgba(0,0,0,0.7), inset 0 1px 2px rgba(0,0,0,0.5);
  --shadow-peg-filled: 0 3px 10px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.18);

  --peg-size: 38px;
  --peg-tap: 44px;
  --palette-size: 44px;
  --feedback-size: 13px;
  --row-height: 60px;
}

[data-colorblind="deuteranopia"] {
  --color-1: #D55E00;
  --color-2: #F0E442;
  --color-3: #0072B2;
  --color-4: #009E73;
  --color-5: #E69F00;
  --color-6: #CC79A7;
}
[data-colorblind="protanopia"] {
  --color-1: #FF8C69;
  --color-2: #F0E442;
  --color-3: #0072B2;
  --color-4: #009E73;
  --color-5: #E69F00;
  --color-6: #CC79A7;
}
[data-colorblind="tritanopia"] {
  --color-1: #D55E00;
  --color-2: #F0E442;
  --color-3: #56B4E9;
  --color-4: #009E73;
  --color-5: #E69F00;
  --color-6: #CC79A7;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; background: var(--bg-app); }
body {
  min-height: 100%;
  height: 100dvh;
  font-family: var(--font-ui);
  color: var(--text-primary);
  background: var(--bg-app);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#app {
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font-ui);
  color: inherit;
}
button:focus-visible {
  outline: 2px solid var(--color-accent);
  outline-offset: 3px;
  border-radius: var(--radius-button);
}

/* =============================================
   SCREEN TRANSITIONS
   ============================================= */
.screen {
  display: flex;
  flex-direction: column;
  height: 100%;
  animation: screenFadeIn 250ms ease;
}
@keyframes screenFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .screen { animation: none; }
  * { transition-duration: 0ms !important; animation-duration: 0ms !important; }
}

/* =============================================
   SETUP SCREEN
   ============================================= */
.setup-screen {
  overflow-y: auto;
  background: var(--bg-app);
}
.setup-inner {
  max-width: 440px;
  margin: 0 auto;
  padding: 40px 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.app-title {
  text-align: center;
}
.app-title h1 {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: clamp(2rem, 8vw, 2.8rem);
  letter-spacing: 0.12em;
  color: var(--text-primary);
  text-transform: uppercase;
}
.app-title .title-sub {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--color-accent);
  text-transform: uppercase;
  margin-top: 6px;
}
.title-decoration {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}
.title-decoration span {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.settings-card {
  background: var(--bg-board);
  border: 1px solid rgba(200,169,110,0.12);
  border-radius: 14px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.settings-card-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--color-accent);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.setting-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.setting-label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

/* Segmented Control */
.seg-control {
  display: flex;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 3px;
  gap: 3px;
  border: 1px solid rgba(255,255,255,0.06);
}
.seg-btn {
  flex: 1;
  padding: 8px 6px;
  border-radius: 6px;
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 150ms ease;
  text-align: center;
  white-space: nowrap;
}
.seg-btn.active {
  background: var(--color-accent);
  color: #1a1208;
  font-weight: 600;
}
.seg-btn:not(.active):hover { color: var(--text-primary); }
.seg-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }

/* Toggle */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.toggle-label-text {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-primary);
}
.toggle {
  position: relative;
  width: 44px; height: 26px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 13px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: background 200ms ease;
}
.toggle input:checked + .toggle-track { background: var(--color-accent); }
.toggle-track::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform 200ms cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.toggle input:checked + .toggle-track::after { transform: translateX(18px); }
.toggle:focus-within .toggle-track { outline: 2px solid var(--color-accent); outline-offset: 2px; }

/* Date Picker */
.date-picker-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.date-picker-row input[type="date"] {
  flex: 1;
  background: var(--bg-board);
  color: var(--text-primary);
  border: 1px solid var(--text-secondary);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--font-ui);
  font-size: 14px;
  min-height: 44px;
  color-scheme: dark;
}
.date-picker-row input[type="date"]:focus {
  outline: 2px solid var(--color-accent);
  outline-offset: 2px;
}
.date-picker-row input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.7) sepia(0.5) saturate(1.5) hue-rotate(10deg);
  cursor: pointer;
}
.puzzle-number-badge {
  font-weight: 600;
  color: var(--color-accent);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  white-space: nowrap;
}

/* Colorblind seg — 2 rows */
.seg-control.seg-cb {
  flex-wrap: wrap;
}
.seg-control.seg-cb .seg-btn { flex: 0 0 calc(50% - 2px); }

/* Advanced Settings Accordion */
.advanced-accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 12px 0 0;
  margin: 0;
  border: none;
  border-top: 1px solid rgba(200,169,110,0.12);
  background: none;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--text-secondary);
  text-transform: uppercase;
  min-height: 44px;
}
.advanced-accordion-header:hover { color: var(--text-primary); }
.advanced-accordion-header:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; border-radius: 4px; }
.advanced-accordion-chevron {
  color: var(--color-accent);
  font-size: 0.85rem;
  transition: transform 250ms ease;
  flex-shrink: 0;
}
.advanced-accordion-header[aria-expanded="true"] .advanced-accordion-chevron {
  transform: rotate(90deg);
}
.advanced-accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 250ms ease;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.advanced-accordion-body.open {
  max-height: 500px;
}

.start-btn {
  background: var(--color-accent);
  color: #1a1208;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 16px 24px;
  border-radius: 10px;
  width: 100%;
  transition: transform 100ms ease, box-shadow 100ms ease;
  box-shadow: 0 4px 20px rgba(200,169,110,0.25);
}
.start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(200,169,110,0.35); }
.start-btn:active { transform: translateY(0); }

/* =============================================
   CODE ENTRY SCREEN (Two-Player)
   ============================================= */
.code-entry-screen {
  background: #0a0c14;
  justify-content: center;
  align-items: center;
  gap: 0;
}
.code-entry-inner {
  width: 100%;
  max-width: 440px;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.code-entry-label {
  font-family: var(--font-display);
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: #6b7aab;
  text-transform: uppercase;
}
.code-entry-title {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 5vw, 1.8rem);
  font-weight: 700;
  color: #c8d4f0;
  text-align: center;
  letter-spacing: 0.06em;
}
.code-entry-slots {
  display: flex;
  gap: 14px;
}
.confirm-btn {
  background: #3a4a7a;
  color: #c8d4f0;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 8px;
  width: 100%;
  max-width: 300px;
  transition: all 150ms ease;
  opacity: 1;
}
.confirm-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.confirm-btn:not(:disabled):hover { background: #4a5a8a; }

/* =============================================
   HANDOFF SCREEN
   ============================================= */
.handoff-screen {
  justify-content: center;
  align-items: center;
  background: #100e0a;
}
.handoff-inner {
  max-width: 380px;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  text-align: center;
}
.handoff-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(200,169,110,0.1);
  border: 2px solid rgba(200,169,110,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.handoff-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-primary);
}
.handoff-msg {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.handoff-btn {
  background: var(--color-accent);
  color: #1a1208;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.9rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 15px 40px;
  border-radius: 8px;
  transition: all 100ms ease;
}
.handoff-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,169,110,0.3); }

/* =============================================
   GAME SCREEN
   ============================================= */
.game-screen {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 8px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.game-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--text-primary);
}
.attempt-counter {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--color-accent);
  letter-spacing: 0.08em;
}

/* Help Tooltip */
.game-title-wrap {
  display: flex;
  align-items: center;
}
.help-btn {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(200,169,110,0.15);
  border: 1px solid rgba(200,169,110,0.35);
  color: var(--color-accent);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  margin-left: 8px;
  flex-shrink: 0;
  transition: background 150ms ease;
  line-height: 1;
}
.help-btn:hover { background: rgba(200,169,110,0.28); }
.help-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; border-radius: 50%; }

.tooltip-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 499;
}
.tooltip-overlay.open { display: block; }

.tooltip-panel {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(92vw, 400px);
  max-height: 82dvh;
  overflow-y: auto;
  background: #1c1610;
  border: 1px solid rgba(200,169,110,0.25);
  border-radius: 14px;
  padding: 22px 20px 20px;
  z-index: 500;
  box-shadow: 0 20px 60px rgba(0,0,0,0.75);
  animation: tooltipIn 200ms ease;
}
.tooltip-panel.open { display: block; }
@keyframes tooltipIn {
  from { opacity: 0; transform: translate(-50%, -47%) scale(0.96); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.tooltip-close {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 1rem;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  background: none; border: none;
}
.tooltip-close:hover { color: var(--text-primary); }
.tooltip-close:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; border-radius: 4px; }
.tooltip-panel h2 {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--color-accent);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-right: 24px;
}
.tooltip-panel h3 {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: var(--color-accent);
  text-transform: uppercase;
  margin: 16px 0 6px;
}
.tooltip-panel p {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 4px;
}
.tooltip-panel ul {
  list-style: none;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.tooltip-panel ul li {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
  padding-left: 14px;
  position: relative;
}
.tooltip-panel ul li::before {
  content: '–';
  position: absolute; left: 0;
  color: var(--color-accent);
}
.tooltip-panel ol {
  padding-left: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin: 0;
}
.tooltip-panel ol li {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
}
.tooltip-panel strong { color: var(--text-primary); font-weight: 600; }
.tooltip-fb-table {
  width: 100%;
  border-collapse: collapse;
  margin: 6px 0;
}
.tooltip-fb-table td {
  padding: 7px 8px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  vertical-align: middle;
  line-height: 1.5;
}
.tooltip-fb-table td:first-child { width: 30px; text-align: center; }
.tooltip-fb-table tr:last-child td { border-bottom: none; }
.fb-demo {
  width: 13px; height: 13px;
  border-radius: 50%;
  display: inline-block;
  vertical-align: middle;
}
.fb-demo.black { background: #1a1a1a; border: 2px solid #c8a96e; box-shadow: 0 0 4px rgba(200,169,110,0.35); }
.fb-demo.white { background: #f0f0f0; border: 1.5px solid #888; }
.fb-demo.empty { background: transparent; border: 1.5px solid rgba(255,255,255,0.15); }
.tooltip-callout {
  background: rgba(200,169,110,0.07);
  border-left: 2px solid var(--color-accent);
  border-radius: 0 6px 6px 0;
  padding: 8px 10px;
  margin: 10px 0 4px;
  font-size: 0.79rem;
  color: var(--text-secondary);
  line-height: 1.55;
}
.tooltip-footer {
  margin-top: 16px;
  font-size: 0.82rem;
  color: var(--text-secondary);
  text-align: center;
}
.tooltip-divider {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin: 14px 0 0;
}

/* Secret Code Panel */
.secret-panel {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px 8px;
  flex-shrink: 0;
}
.secret-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  color: var(--text-secondary);
  text-transform: uppercase;
  min-width: 60px;
  text-align: right;
}
.secret-slots {
  display: flex;
  gap: 8px;
}
.secret-slot-wrap {
  position: relative;
  width: var(--peg-tap);
  height: var(--peg-tap);
  display: flex; align-items: center; justify-content: center;
}
.secret-slot-mask {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.secret-mask-circle {
  width: var(--peg-size); height: var(--peg-size);
  border-radius: 50%;
  background: #2a2520;
  border: 2px solid #3a3028;
  box-shadow: var(--shadow-slot-inset);
}
.secret-slot-mask.reveal-win {
  animation: maskSlideUp 400ms ease-in-out forwards;
}
.secret-slot-mask.reveal-loss {
  animation: maskFadeOut 800ms ease-in forwards;
}
@keyframes maskSlideUp {
  to { transform: translateY(-100%); opacity: 0; }
}
@keyframes maskFadeOut {
  to { opacity: 0; }
}

/* Board */
.board-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--board-padding);
  padding-bottom: calc(var(--controls-height) + 16px);
  scroll-behavior: smooth;
}
.board {
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: var(--row-gap);
}

/* Guess Row */
.guess-row {
  display: flex;
  align-items: center;
  height: var(--row-height);
  border-radius: var(--radius-row);
  padding: 0 10px;
  gap: 8px;
  transition: background 200ms ease;
  position: relative;
}
.guess-row.state-completed {
  background: var(--bg-row-completed);
  opacity: 1;
}
.guess-row.state-active {
  background: var(--bg-row-active);
  border: 1px solid rgba(200,169,110,0.2);
  box-shadow: 0 0 0 1px rgba(200,169,110,0.06), 0 8px 32px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.4);
  /* Sticky: row floats at bottom of board area when user scrolls up through history.
     bottom: 8px gives a small breathing gap above the controls bar.
     z-index ensures it floats above completed rows scrolling behind it. */
  position: sticky;
  bottom: 8px;
  z-index: 10;
}
.guess-row.state-empty {
  background: var(--bg-row-empty);
  opacity: 0.38;
}
.row-number {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-secondary);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}
.row-slots {
  display: flex;
  gap: var(--slot-gap);
  flex: 1;
  justify-content: center;
}

/* Peg Slot */
.peg-slot-wrap {
  width: var(--peg-tap);
  height: var(--peg-tap);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  cursor: pointer;
}
.peg-slot-wrap.locked { pointer-events: none; }
.peg-visual {
  width: var(--peg-size); height: var(--peg-size);
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  transition: transform 200ms cubic-bezier(0.34,1.56,0.64,1);
}
.peg-visual.state-empty {
  background: var(--slot-empty-fill);
  border: 1.5px solid var(--slot-empty-border);
  box-shadow: var(--shadow-slot-inset);
}
.peg-visual.state-filled,
.peg-visual.state-locked-filled {
  box-shadow: var(--shadow-peg-filled);
}
.peg-visual.placing {
  animation: pegPlace 200ms cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pegPlace {
  0% { transform: scale(0.6); }
  70% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
.peg-visual.locking {
  animation: pegLock 300ms ease-in-out;
}
@keyframes pegLock {
  0% { opacity: 1; }
  40% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* Selection ring */
.peg-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2.5px solid var(--slot-selected-ring);
  pointer-events: none;
  animation: ringPulse 1.4s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.04); }
}

/* Pattern overlays */
.peg-pattern {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
  /* opacity set per-pattern — each pattern defines its own value */
}
/* Pattern 1: Bold horizontal stripes (Brown/Red) */
.pattern-1 {
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.9) 0px, rgba(0,0,0,0.9) 3px,
    transparent 3px, transparent 7px
  );
  opacity: 0.28;
}
/* Pattern 2: Zigzag / chevron (Yellow) — categorically distinct from Orange */
.pattern-2 {
  background: repeating-linear-gradient(
    135deg,
    rgba(0,0,0,0.85) 0px,  rgba(0,0,0,0.85) 2px,
    transparent 2px,        transparent 7px,
    rgba(0,0,0,0.85) 7px,  rgba(0,0,0,0.85) 9px,
    transparent 9px,        transparent 14px
  );
  opacity: 0.28;
}
/* Pattern 3: Diagonal stripes (Blue) */
.pattern-3 {
  background: repeating-linear-gradient(
    45deg,
    rgba(0,0,0,0.85) 0px, rgba(0,0,0,0.85) 2.5px,
    transparent 2.5px, transparent 8px
  );
  opacity: 0.26;
}
/* Pattern 4: Dot grid (Teal) */
.pattern-4 {
  background-image: radial-gradient(rgba(0,0,0,0.95) 2px, transparent 2px);
  background-size: 7px 7px;
  opacity: 0.28;
}
/* Pattern 5: Concentric rings (Orange) — categorically distinct from Yellow */
.pattern-5 {
  background:
    radial-gradient(circle, transparent 4px,  rgba(0,0,0,0.7) 4px,  rgba(0,0,0,0.7) 6px,  transparent 6px),
    radial-gradient(circle, transparent 10px, rgba(0,0,0,0.7) 10px, rgba(0,0,0,0.7) 12px, transparent 12px),
    radial-gradient(circle, transparent 16px, rgba(0,0,0,0.7) 16px, rgba(0,0,0,0.7) 18px, transparent 18px);
  opacity: 0.35;
}
/* Pattern 6: Inner ring border (Purple) */
.pattern-6 {
  background: transparent;
  border: 3.5px solid rgba(255,255,255,0.35);
  box-shadow: inset 0 0 0 3.5px rgba(0,0,0,0.25);
  opacity: 0.45;
}

/* Gloss overlay on filled pegs */
.peg-gloss {
  position: absolute;
  top: 4px; left: 6px;
  width: 55%; height: 40%;
  border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
  background: linear-gradient(160deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0) 100%);
  pointer-events: none;
}

/* Feedback Panel */
.feedback-panel {
  width: 36px;
  flex-shrink: 0;
}
.feedback-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
}
.fb-peg {
  width: var(--feedback-size);
  height: var(--feedback-size);
  border-radius: 50%;
}
.fb-peg.fb-black {
  background: #1a1a1a;
  border: 2px solid #c8a96e;
  box-shadow: 0 0 4px rgba(200,169,110,0.35), inset 0 1px 2px rgba(255,255,255,0.08);
}
.fb-peg.fb-white {
  background: var(--feedback-white);
  border: 1.5px solid #888;
}
.fb-peg.fb-empty {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.1);
}
.fb-peg.animating {
  animation: fbReveal 150ms ease-out both;
}
@keyframes fbReveal {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* =============================================
   BOTTOM CONTROLS
   ============================================= */
.bottom-controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--controls-height);
  background: var(--bg-controls);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
}
.palette-row {
  display: flex;
  gap: 10px;
}
.palette-peg-wrap {
  width: var(--peg-tap);
  height: var(--peg-tap);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: opacity 150ms ease;
}
.palette-peg-wrap.unavailable {
  opacity: 0.28;
  pointer-events: none;
}
.palette-peg-visual {
  width: var(--palette-size);
  height: var(--palette-size);
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-peg-filled);
  transition: transform 120ms ease;
}
.palette-peg-wrap:not(.unavailable):hover .palette-peg-visual {
  transform: scale(1.1);
}
.palette-peg-wrap:not(.unavailable):active .palette-peg-visual {
  transform: scale(0.94);
}

.action-row {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 420px;
}
.clear-btn {
  flex: 0 0 80px;
  padding: 9px 0;
  border-radius: var(--radius-button);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  text-transform: uppercase;
  transition: all 120ms ease;
}
.clear-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.submit-btn {
  flex: 1;
  padding: 9px 0;
  border-radius: var(--radius-button);
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: all 120ms ease;
  background: var(--color-submit);
  color: #1a1208;
  box-shadow: 0 2px 12px rgba(200,169,110,0.2);
}
.submit-btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,169,110,0.3); }
.submit-btn:disabled {
  background: var(--color-submit-disabled);
  color: var(--text-disabled);
  cursor: not-allowed;
  box-shadow: none;
}

/* =============================================
   END STATE — SHARED CARD STYLES
   Used by both the modal overlay and the inline
   fallback block below the board.
   ============================================= */
@keyframes overlayIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* Inline fallback — visible below board after modal is dismissed */
.end-overlay {
  max-width: 420px;
  margin: 12px auto 8px;
  padding: 24px 20px;
  background: linear-gradient(135deg, rgba(42,32,24,0.98), rgba(30,22,16,0.98));
  border: 1px solid rgba(200,169,110,0.35);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-align: center;
  animation: overlayIn 300ms ease-out;
}
.end-overlay-emoji {
  font-size: 2.6rem;
  line-height: 1;
}
.end-result {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--color-accent);
}
.end-result.lost { color: var(--text-secondary); }
.end-new-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,169,110,0.25);
  color: var(--color-accent);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 24px;
  border-radius: var(--radius-button);
  transition: all 150ms ease;
  width: 100%;
  max-width: 240px;
}
.end-new-btn:hover {
  background: rgba(200,169,110,0.12);
  border-color: rgba(200,169,110,0.4);
}
.end-new-btn:active { transform: scale(0.97); }

/* =============================================
   RESULT MODAL OVERLAY
   Fixed full-screen modal — primary result surface
   z-index 400 (above board, below share modal 499)
   ============================================= */
.result-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: backdropIn 250ms ease-out;
}
@keyframes backdropIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.result-modal-card {
  background: linear-gradient(135deg, rgba(42,32,24,0.98), rgba(30,22,16,0.98));
  border: 1px solid rgba(200,169,110,0.35);
  border-radius: 14px;
  padding: 32px 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  text-align: center;
  width: 100%;
  max-width: 360px;
  animation: overlayIn 300ms ease-out;
  position: relative;
}
.result-modal-emoji {
  font-size: 3rem;
  line-height: 1;
}
.result-modal-msg {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--color-accent);
}
.result-modal-msg.lost { color: var(--text-secondary); }
.result-modal-close-hint {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  opacity: 0.6;
  margin-top: 4px;
}

/* =============================================
   EMOJI BURST PARTICLES
   Injected into body on win, self-removing
   ============================================= */
.emoji-burst-particle {
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 1.6rem;
  line-height: 1;
  pointer-events: none;
  z-index: 401;
  transform-origin: center center;
  animation: emojiBurst calc(900ms + var(--duration-offset, 0ms)) ease-out forwards;
}
@keyframes emojiBurst {
  0%   { transform: translate(-50%, -50%) rotate(0deg) scale(0); opacity: 1; }
  40%  { opacity: 1; transform: translate(
    calc(-50% + cos(var(--angle, 0deg)) * var(--distance, 150px)),
    calc(-50% + sin(var(--angle, 0deg)) * var(--distance, 150px))
  ) scale(1.4); }
  100% { transform: translate(
    calc(-50% + cos(var(--angle, 0deg)) * var(--distance, 150px) * 1.3),
    calc(-50% + sin(var(--angle, 0deg)) * var(--distance, 150px) * 1.3)
  ) scale(0.8); opacity: 0; }
}

/* =============================================
   LOGO HOME BUTTON
   ============================================= */
button.game-title {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  font: inherit;
  letter-spacing: inherit;
  color: inherit;
  opacity: 1;
  transition: opacity 150ms ease;
}
button.game-title:hover { opacity: 0.7; }

/* =============================================
   ABANDON GAME DIALOG
   z-index 401 — above result overlay
   ============================================= */
.abandon-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 401;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.abandon-card {
  background: #1c1610;
  border: 1px solid rgba(200,169,110,0.3);
  border-radius: 14px;
  padding: 28px 24px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
  width: 100%;
  max-width: 320px;
}
.abandon-title {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--color-accent);
}
.abandon-body {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-secondary);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.abandon-actions {
  display: flex;
  gap: 10px;
  width: 100%;
}
.abandon-cancel-btn {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(200,169,110,0.25);
  color: var(--text-secondary);
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 11px 8px;
  border-radius: var(--radius-button);
  cursor: pointer;
  transition: all 100ms ease;
}
.abandon-cancel-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.abandon-leave-btn {
  flex: 1;
  background: var(--color-accent);
  color: #1a1208;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 11px 8px;
  border-radius: var(--radius-button);
  cursor: pointer;
  transition: all 100ms ease;
}
.abandon-leave-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200,169,110,0.3); }

/* Share Button */
.share-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--color-accent);
  border: none;
  color: #1a1208;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 12px 32px;
  border-radius: var(--radius-button);
  transition: all 100ms ease;
  width: 100%;
  max-width: 240px;
}
.share-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,169,110,0.3); }
.share-btn:active { transform: scale(0.97); }
.share-btn .share-icon {
  font-size: 0.9rem;
  line-height: 1;
}

/* Share Toast */
.share-toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(30,24,16,0.95);
  border: 1px solid rgba(200,169,110,0.3);
  color: var(--color-accent);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  animation: toastIn 2s ease forwards;
}
@keyframes toastIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  12% { opacity: 1; transform: translateX(-50%) translateY(0); }
  75% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
}

/* Share Manual Copy Modal */
.share-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 499;
  display: flex; align-items: center; justify-content: center;
}
.share-modal {
  background: #1c1610;
  border: 1px solid rgba(200,169,110,0.25);
  border-radius: 14px;
  padding: 20px;
  width: min(90vw, 360px);
  display: flex; flex-direction: column; gap: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.75);
}
.share-modal-title {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--color-accent);
  text-transform: uppercase;
}
.share-modal textarea {
  width: 100%;
  min-height: 180px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 12px;
  resize: none;
  line-height: 1.5;
}
.share-modal-close {
  align-self: flex-end;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 8px 20px;
  border-radius: var(--radius-button);
  transition: all 120ms ease;
}
.share-modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

/* Confetti */
.confetti-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -12px;
  width: 8px; height: 8px;
  border-radius: 2px;
  animation: confettiFall 1200ms ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Code-entry flip animation */
.flip-out {
  animation: flipOut 120ms ease-in forwards;
}
@keyframes flipOut {
  to { transform: rotateY(90deg); opacity: 0; }
}

/* =============================================
   RESPONSIVE
   ============================================= */
@media (min-width: 480px) {
  :root {
    --peg-size: 40px;
    --palette-size: 46px;
    --feedback-size: 14px;
    --row-height: 62px;
  }
}
@media (max-width: 360px) {
  :root {
    --peg-size: 32px;
    --palette-size: 38px;
    --slot-gap: 6px;
    --row-height: 52px;
  }
  .palette-row { gap: 6px; }
}

// =============================================

// =============================================
// Generates deterministic daily puzzles based on local user time
// Uses seeded PRNG (Mulberry32) for consistent, client-side code generation

const DailyPuzzleSystem = (() => {
  const LAUNCH_DATE = new Date(2026, 2, 21); // March 21, 2026
  const COLOR_IDS = [1, 2, 3, 4, 5, 6];

  function mulberry32(a) {
    return function() {
      a |= 0;
      a = (a + 0x6d2b79f5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;

    for (let i = 0; i < str.length; i++) {
      const char = str.charCodeAt(i);
      seed = ((seed << 5) - seed) + char;
      seed = seed & seed;
    }
    return seed === 0 ? 1 : Math.abs(seed);
  }

  function getLocalDateString() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}${month}${day}`;
  }

  function getLocalMidnight() {
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate());
  }

  function calculatePuzzleNumber() {
    const today = getLocalMidnight();
    const launchMidnight = new Date(LAUNCH_DATE.getFullYear(), LAUNCH_DATE.getMonth(), LAUNCH_DATE.getDate());
    const msPerDay = 24 * 60 * 60 * 1000;
    const daysDiff = Math.floor((today - launchMidnight) / msPerDay);
    return Math.max(1, daysDiff + 1);
  }

  function generateCode(seed, allowDuplicates) {
    const rng = mulberry32(seed);
    const colors = [...COLOR_IDS];
    const result = [];

    if (allowDuplicates) {
      for (let i = 0; i < 4; i++) {
        const idx = Math.floor(rng() * 6);
        result.push(colors[idx]);
      }
    } else {
      for (let i = colors.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [colors[i], colors[j]] = [colors[j], colors[i]];
      }
      result.push(...colors.slice(0, 4));
    }

    return result;
  }

  function getTodaysPuzzle(mode = 'nodup') {
    const dateString = getLocalDateString();
    const seedSuffix = mode === 'dup' ? 'D' : 'N';
    const seedString = `${dateString}${seedSuffix}`;
    const seed = stringToSeed(seedString);
    const allowDuplicates = mode === 'dup';
    const code = generateCode(seed, allowDuplicates);
    const puzzleNumber = calculatePuzzleNumber();
    return { code, puzzleNumber, mode, dateString, seed: seedString };
  }

  function getPuzzleForDate(date, mode = 'nodup') {
    // Validate: no future dates allowed
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const targetDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    
    if (targetDate > today) {
      throw new Error(`Cannot access future puzzle. Date requested: ${targetDate.toLocaleDateString()}, Today: ${today.toLocaleDateString()}`);
    }

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const dateString = `${year}${month}${day}`;
    const seedSuffix = mode === 'dup' ? 'D' : 'N';
    const seedString = `${dateString}${seedSuffix}`;
    const seed = stringToSeed(seedString);
    const allowDuplicates = mode === 'dup';
    const code = generateCode(seed, allowDuplicates);
    const targetMidnight = new Date(year, date.getMonth(), day);
    const launchMidnight = new Date(LAUNCH_DATE.getFullYear(), LAUNCH_DATE.getMonth(), LAUNCH_DATE.getDate());
    const msPerDay = 24 * 60 * 60 * 1000;
    const daysDiff = Math.floor((targetMidnight - launchMidnight) / msPerDay);
    const puzzleNumber = Math.max(1, daysDiff + 1);
    return { code, puzzleNumber, mode, dateString, seed: seedString };
  }

  return {
    getTodaysPuzzle,
    getPuzzleForDate,
    calculatePuzzleNumber,
    getLocalDateString
  };
})();
</script>

<script>
const COLOR_NAMES = { 1:'Red', 2:'Yellow', 3:'Blue', 4:'Green', 5:'Orange', 6:'Purple' };
const COLOR_IDS = [1,2,3,4,5,6];

const DEFAULT_SETTINGS = {
  gameMode: 'daily', // Daily Challenge is the default mode on load
  dailyGameMode: 'nodup', // 'dup' or 'nodup' for daily challenges
  allowDuplicates: false,
  maxAttempts: 8,
  showAttemptCounter: true,
  colorblindMode: 'off'
};

// Helper: today's local date as YYYY-MM-DD
function getTodayDateString() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// Helper: puzzle number for a given YYYY-MM-DD string
function puzzleNumberForDateString(dateStr) {
  const parts = dateStr.split('-');
  const target = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  const launch = new Date(2026, 2, 21); // March 21, 2026
  const msPerDay = 24 * 60 * 60 * 1000;
  const daysDiff = Math.floor((target - launch) / msPerDay);
  return Math.max(1, daysDiff + 1);
}

// =============================================
// GAME LOGIC (pure functions)
// =============================================
function generateCode(allowDuplicates) {
  const colors = [1,2,3,4,5,6];
  const result = [];
  if (allowDuplicates) {
    for (let i = 0; i < 4; i++) result.push(colors[Math.floor(Math.random() * 6)]);
  } else {
    const pool = [...colors];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    result.push(...pool.slice(0, 4));
  }
  return result;
}

function getFeedback(secret, guess) {
  const secretUsed = [false,false,false,false];
  const guessUsed  = [false,false,false,false];
  let black = 0;
  for (let i = 0; i < 4; i++) {
    if (guess[i] === secret[i]) { black++; secretUsed[i] = true; guessUsed[i] = true; }
  }
  let white = 0;
  for (let i = 0; i < 4; i++) {
    if (guessUsed[i]) continue;
    for (let j = 0; j < 4; j++) {
      if (secretUsed[j]) continue;
      if (guess[i] === secret[j]) { white++; secretUsed[j] = true; break; }
    }
  }
  return { black, white };
}

function isRowComplete(slots) { return slots.every(s => s !== null); }

// Returns the effective allow-duplicates flag for the current game mode.
// Daily mode uses dailyGameMode ('dup'/'nodup'); other modes use allowDuplicates.
function effectiveAllowDuplicates(settings) {
  if (settings.gameMode === 'daily') {
    return settings.dailyGameMode === 'dup';
  }
  return settings.allowDuplicates;
}

function getAvailableColors(slots, allowDuplicates) {
  if (allowDuplicates) return COLOR_IDS;
  const used = slots.filter(s => s !== null);
  return COLOR_IDS.filter(c => !used.includes(c));
}

// =============================================
// SETTINGS PERSISTENCE
// =============================================
function loadSettings() {
  try {
    const raw = localStorage.getItem('codebreaker_settings');
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    // gameMode does not persist
    delete parsed.gameMode;
    // dailyPuzzleDate does not persist — always reset to today
    delete parsed.dailyPuzzleDate;
    return parsed;
  } catch { return {}; }
}

function saveSettings(settings) {
  try {
    const toSave = { ...settings };
    delete toSave.gameMode; // transient
    delete toSave.dailyPuzzleDate; // transient — always reset to today
    localStorage.setItem('codebreaker_settings', JSON.stringify(toSave));
  } catch {}
}

// =============================================
// COLORBLIND ATTRIBUTE
// =============================================
function applyColorblindMode(mode) {
  const el = document.documentElement;
  if (mode === 'off') el.removeAttribute('data-colorblind');
  else el.setAttribute('data-colorblind', mode);
}

// =============================================
// STATE MANAGEMENT
// =============================================
function createInitialState() {
  const saved = loadSettings();
  const settings = { ...DEFAULT_SETTINGS, ...saved };
  return {
    status: 'setup',
    settings,
    secretCode: null,
    dailyPuzzleCode: null, // For daily mode
    puzzleNumber: null,     // For daily mode
    completedRows: [],
    activeRow: { slots: [null,null,null,null], selectedSlotIndex: null },
    attemptNumber: 1
  };
}

let state = createInitialState();
let lastAction = null;
applyColorblindMode(state.settings.colorblindMode);

function setState(newState) {
  state = newState;
  render();
  // Persist after every state change (async — non-blocking)
  saveGameState(newState);
}

function dispatch(action) {
  lastAction = action.type;
  const s = state;
  switch (action.type) {
    case 'UPDATE_SETTINGS': {
      const newSettings = { ...s.settings, ...action.payload };
      saveSettings(newSettings);
      applyColorblindMode(newSettings.colorblindMode);
      setState({ ...s, settings: newSettings });
      break;
    }
    case 'START_GAME': {
      if (s.settings.gameMode === 'daily') {
        // Daily challenge mode — use selected date (defaults to today)
        const dateStr = s.settings.dailyPuzzleDate || getTodayDateString();

        // Check for a saved daily state for this date+variant before starting fresh.
        // If found, restore it and re-show the result overlay if completed.
        // See: spec-codebreaker-daily-lockout §3.2
        const savedDaily = loadDailyState(dateStr, s.settings.dailyGameMode);
        if (savedDaily) {
          const completedRows = savedDaily.guesses.map((g, i) => ({
            guess: g,
            feedback: savedDaily.feedback[i]
          }));
          const restoredSettings = {
            ...s.settings,
            dailyGameMode: savedDaily.settings.dailyGameMode,
            dailyPuzzleDate: savedDaily.date,
            maxAttempts: savedDaily.settings.maxAttempts,
            allowDuplicates: savedDaily.settings.allowDuplicates
          };
          const restoredState = {
            ...s,
            status: savedDaily.status,
            settings: restoredSettings,
            secretCode: savedDaily.secretCode,
            dailyPuzzleCode: savedDaily.secretCode,
            puzzleNumber: savedDaily.puzzleNumber,
            completedRows,
            activeRow: {
              slots: [null, null, null, null],
              selectedSlotIndex: savedDaily.status === 'in-progress' ? 0 : null
            },
            attemptNumber: completedRows.length + 1
          };
          setState(restoredState);
          // Re-show result overlay for completed games
          if (savedDaily.status === 'won' || savedDaily.status === 'lost') {
            setTimeout(() => {
              revealSecretCode(savedDaily.status === 'won' ? 'win' : 'loss');
              showResultOverlay(restoredState);
            }, 200);
          }
          break;
        }
        // No saved state — start a fresh daily puzzle for this date+variant.
        const parts = dateStr.split('-');
        const selectedDate = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        const dailyPuzzle = DailyPuzzleSystem.getPuzzleForDate(selectedDate, s.settings.dailyGameMode);
        // spec-codebreaker-posthog: game_started (daily, fresh only — restoring saved state does not fire)
        posthog.capture('game_started', {
          mode: 'daily',
          allow_duplicates: s.settings.dailyGameMode === 'dup',
          max_attempts: s.settings.maxAttempts
        });
        setState({
          ...s, status: 'in-progress',
          secretCode: dailyPuzzle.code,
          dailyPuzzleCode: dailyPuzzle.code,
          puzzleNumber: dailyPuzzle.puzzleNumber,
          completedRows: [],
          activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 },
          attemptNumber: 1
        });
      } else if (s.settings.gameMode === 'single') {
        // Single player
        // spec-codebreaker-posthog: game_started (single)
        posthog.capture('game_started', {
          mode: 'single',
          allow_duplicates: s.settings.allowDuplicates,
          max_attempts: s.settings.maxAttempts
        });
        setState({
          ...s, status: 'in-progress',
          secretCode: generateCode(s.settings.allowDuplicates),
          completedRows: [],
          activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 },
          attemptNumber: 1
        });
      } else {
        // Two player — fires on transition to 'code-entry' (see spec-codebreaker-posthog §5)
        // spec-codebreaker-posthog: game_started (two_player)
        posthog.capture('game_started', {
          mode: 'two_player',
          allow_duplicates: s.settings.allowDuplicates,
          max_attempts: s.settings.maxAttempts
        });
        setState({
          ...s, status: 'code-entry',
          secretCode: null,
          completedRows: [],
          activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 },
          attemptNumber: 1
        });
      }
      break;
    }
    case 'CONFIRM_CODE': {
      setState({ ...s, status: 'handoff',
        secretCode: action.payload,
        activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 }
      });
      break;
    }
    case 'START_GUESSING': {
      setState({ ...s, status: 'in-progress' });
      break;
    }
    case 'SELECT_SLOT': {
      const ar = s.activeRow;
      const idx = action.payload.index;
      const newSlots = [...ar.slots];
      if (ar.slots[idx] !== null) { newSlots[idx] = null; }
      setState({ ...s, activeRow: { slots: newSlots, selectedSlotIndex: idx } });
      break;
    }
    case 'PLACE_COLOR': {
      const ar = s.activeRow;
      if (ar.selectedSlotIndex === null) break;
      const newSlots = [...ar.slots];
      newSlots[ar.selectedSlotIndex] = action.payload.colorId;
      // Advance to next null slot
      let next = null;
      for (let i = ar.selectedSlotIndex + 1; i < 4; i++) {
        if (newSlots[i] === null) { next = i; break; }
      }
      if (next === null) {
        for (let i = 0; i < ar.selectedSlotIndex; i++) {
          if (newSlots[i] === null) { next = i; break; }
        }
      }
      setState({ ...s, activeRow: { slots: newSlots, selectedSlotIndex: next } });
      // Trigger place animation
      setTimeout(() => {
        const el = document.querySelector(`.active-row .peg-slot-wrap[data-idx="${ar.selectedSlotIndex}"] .peg-visual`);
        if (el) { el.classList.remove('placing'); void el.offsetWidth; el.classList.add('placing'); }
      }, 0);
      break;
    }
    case 'CLEAR_SLOT': {
      const newSlots = [...s.activeRow.slots];
      newSlots[action.payload.index] = null;
      setState({ ...s, activeRow: { ...s.activeRow, slots: newSlots, selectedSlotIndex: action.payload.index } });
      break;
    }
    case 'CLEAR_ROW': {
      setState({ ...s, activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 } });
      break;
    }
    case 'SUBMIT_GUESS': {
      if (!isRowComplete(s.activeRow.slots)) break;
      const guess = [...s.activeRow.slots];
      const feedback = getFeedback(s.secretCode, guess);
      const newRow = { guess, feedback };
      const newCompleted = [...s.completedRows, newRow];

      if (feedback.black === 4) {
        setState({ ...s, status: 'won', completedRows: newCompleted });
        triggerWinAnimation();
        // spec-codebreaker-posthog: game_completed (won)
        posthog.capture('game_completed', {
          mode: s.settings.gameMode === 'daily' ? 'daily' : s.settings.gameMode === 'single' ? 'single' : 'two_player',
          outcome: 'won',
          attempts: newCompleted.length,
          max_attempts: s.settings.maxAttempts,
          allow_duplicates: s.settings.gameMode === 'daily' ? s.settings.dailyGameMode === 'dup' : s.settings.allowDuplicates,
          puzzle_number: s.settings.gameMode === 'daily' ? s.puzzleNumber : null
        });
        const winEmoji = getOutcomeEmoji(newCompleted.length, 'won');
        setTimeout(() => {
          revealSecretCode('win');
          showResultOverlay({ ...s, status: 'won', completedRows: newCompleted });
          triggerEmojiBurst(winEmoji);
        }, 300);
        break;
      }
      if (newCompleted.length >= s.settings.maxAttempts) {
        setState({ ...s, status: 'lost', completedRows: newCompleted });
        // spec-codebreaker-posthog: game_completed (lost)
        posthog.capture('game_completed', {
          mode: s.settings.gameMode === 'daily' ? 'daily' : s.settings.gameMode === 'single' ? 'single' : 'two_player',
          outcome: 'lost',
          attempts: newCompleted.length,
          max_attempts: s.settings.maxAttempts,
          allow_duplicates: s.settings.gameMode === 'daily' ? s.settings.dailyGameMode === 'dup' : s.settings.allowDuplicates,
          puzzle_number: s.settings.gameMode === 'daily' ? s.puzzleNumber : null
        });
        setTimeout(() => {
          revealSecretCode('loss');
          showResultOverlay({ ...s, status: 'lost', completedRows: newCompleted });
        }, 400);
        break;
      }
      setState({
        ...s, status: 'in-progress',
        completedRows: newCompleted,
        activeRow: { slots: [null,null,null,null], selectedSlotIndex: 0 },
        attemptNumber: s.attemptNumber + 1
      });
      // After submit, scroll only if the just-completed row is hidden behind the
      // floating active row. If everything is visible, do nothing.
      // We detect overlap by comparing the bottom of the last completed row against
      // the top of the sticky active row — if the completed row's bottom is below
      // the active row's top, it's obscured and we need to scroll it into view.
      setTimeout(() => {
        const boardArea = document.querySelector('.board-area');
        const lastCompletedEl = boardArea && boardArea.querySelector(`.guess-row[data-row="${newCompleted.length - 1}"]`);
        const activeEl = document.querySelector('.guess-row.state-active');
        if (!boardArea || !lastCompletedEl || !activeEl) return;

        const lastRect = lastCompletedEl.getBoundingClientRect();
        const activeRect = activeEl.getBoundingClientRect();

        // If the last completed row is fully above the active row, it's visible — do nothing
        if (lastRect.bottom <= activeRect.top) return;

        // Last completed row is obscured behind the floating active row.
        // scrollIntoView block:'end' doesn't account for the sticky active row's height,
        // so we scroll by the exact overlap amount instead — moving the board up just
        // enough that lastRect.bottom lands at activeRect.top with a small gap.
        const overlap = lastRect.bottom - activeRect.top + 8;
        boardArea.scrollBy({ top: overlap, behavior: 'smooth' });
      }, 80);
      break;
    }
    case 'NEW_GAME': {
      window._advancedOpen = false; // Reset accordion to collapsed
      // Daily state lives in its own keyed entry and must not be wiped on NEW_GAME.
      // Only clear the generic game state for non-daily modes.
      // See: spec-codebreaker-daily-lockout §3.3
      if (s.settings.gameMode !== 'daily') clearGameState();
      setState({
        ...s, status: 'setup',
        secretCode: null,
        completedRows: [],
        activeRow: { slots: [null,null,null,null], selectedSlotIndex: null },
        attemptNumber: 1,
        settings: { ...s.settings, dailyPuzzleDate: getTodayDateString() }
      });
      break;
    }
  }
}

// =============================================
// ANIMATIONS
// =============================================
function revealSecretCode(type) {
  const masks = document.querySelectorAll('.secret-slot-mask');
  masks.forEach((m, i) => {
    setTimeout(() => {
      m.classList.add(type === 'win' ? 'reveal-win' : 'reveal-loss');
    }, i * 80);
  });
}

function triggerWinAnimation() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  const colors = ['#E63946','#F4D03F','#2E86AB','#2ECC71','#E67E22','#9B59B6','#c8a96e'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (5 + Math.random() * 8) + 'px';
    piece.style.height = (5 + Math.random() * 8) + 'px';
    piece.style.animationDelay = Math.random() * 600 + 'ms';
    piece.style.animationDuration = (800 + Math.random() * 600) + 'ms';
    container.appendChild(piece);
  }
  document.body.appendChild(container);
  setTimeout(() => container.remove(), 2000);
}

function triggerFeedbackAnimation(rowEl) {
  const fbPegs = rowEl.querySelectorAll('.fb-peg');
  fbPegs.forEach((peg, i) => {
    peg.style.animationDelay = (i * 80) + 'ms';
    peg.classList.add('animating');
  });
}

// =============================================
// OUTCOME EMOJI SCALE
// Shared helper — used by result overlay and generateShareText.
// See: spec-codebreaker-winloss-overlay §3.4
// =============================================
function getOutcomeEmoji(attempts, status) {
  if (status === 'lost') return '💀';
  if (attempts === 1) return '🤯';
  if (attempts === 2) return '🏆';
  if (attempts === 3) return '🔥';
  if (attempts === 4) return '👍';
  if (attempts === 5) return '😅';
  if (attempts <= 8) return '😬';
  return '😮\u200d💨';
}

// =============================================
// RESULT MODAL OVERLAY
// Injected into <body> on game end. Dismissed by
// backdrop click or Escape. Inline .end-overlay
// remains as fallback after dismissal.
// See: spec-codebreaker-winloss-overlay §3.1–3.5
// =============================================
function showResultOverlay(s) {
  const existing = document.querySelector('.result-modal-backdrop');
  if (existing) existing.remove();

  const { status, completedRows, settings } = s;
  const isWin = status === 'won';
  const emoji = getOutcomeEmoji(completedRows.length, status);

  let msg;
  if (settings.gameMode === 'daily') {
    msg = isWin
      ? `Daily #${s.puzzleNumber} solved in ${completedRows.length} attempt${completedRows.length === 1 ? '' : 's'}!`
      : `Daily #${s.puzzleNumber} not cracked.`;
  } else if (settings.gameMode === 'single') {
    msg = isWin
      ? `Solved in ${completedRows.length} attempt${completedRows.length === 1 ? '' : 's'}!`
      : 'The code was not cracked.';
  } else {
    msg = isWin ? 'The codebreaker wins!' : 'The codemaker wins!';
  }

  const shareBtn = settings.gameMode === 'daily'
    ? `<button class="share-btn" onclick="handleShare()" aria-label="Share my result">
        <span class="share-icon">↑</span>
        ${typeof navigator !== 'undefined' && navigator.share ? 'Share My Result' : 'Copy My Result'}
       </button>`
    : '';

  const backdrop = document.createElement('div');
  backdrop.className = 'result-modal-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', isWin ? 'Game won' : 'Game over');
  backdrop.innerHTML = `
    <div class="result-modal-card" id="resultModalCard">
      <div class="result-modal-emoji" aria-hidden="true">${emoji}</div>
      <div class="result-modal-msg ${isWin ? 'won' : 'lost'}">${msg}</div>
      ${shareBtn}
      <button class="end-new-btn" onclick="dispatch({type:'NEW_GAME'});document.querySelector('.result-modal-backdrop')?.remove();">New Game</button>
      <div class="result-modal-close-hint">Tap outside to close</div>
    </div>`;

  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) {
      backdrop.remove();
      document.removeEventListener('keydown', escHandler);
    }
  });

  const escHandler = (e) => {
    if (e.key === 'Escape') {
      backdrop.remove();
      document.removeEventListener('keydown', escHandler);
      document.querySelector('button.game-title')?.focus();
    }
  };
  document.addEventListener('keydown', escHandler);

  document.body.appendChild(backdrop);
}

// =============================================
// EMOJI BURST ANIMATION
// 14 particles radiating from viewport center on win.
// Pure JS/CSS — no libraries.
// See: spec-codebreaker-winloss-overlay §3.3
// =============================================
function triggerEmojiBurst(emoji) {
  const count = 14;
  for (let i = 0; i < count; i++) {
    const angle = (360 / count) * i + (Math.random() * 20 - 10);
    const distance = 130 + Math.random() * 90;
    const durationOffset = Math.random() * 200;

    const span = document.createElement('span');
    span.className = 'emoji-burst-particle';
    span.textContent = emoji;
    span.style.setProperty('--angle', angle + 'deg');
    span.style.setProperty('--distance', distance + 'px');
    span.style.setProperty('--duration-offset', durationOffset + 'ms');
    span.addEventListener('animationend', () => span.remove());
    document.body.appendChild(span);
  }
}

// =============================================
// LOGO HOME NAVIGATION
// Mid-game: shows abandon dialog.
// Post-game (won/lost): navigates directly.
// See: spec-codebreaker-winloss-overlay §3.6–3.8
// =============================================
function handleLogoNav() {
  const s = state;
  if (s.status === 'won' || s.status === 'lost') {
    document.querySelector('.result-modal-backdrop')?.remove();
    dispatch({ type: 'NEW_GAME' });
    return;
  }
  if (s.status === 'in-progress') {
    // Daily mode: navigate freely without abandon confirmation.
    // Progress is already persisted to the daily key and will restore on Start Game.
    // See: spec-codebreaker-daily-lockout §3.4
    if (s.settings.gameMode === 'daily') {
      dispatch({ type: 'NEW_GAME' });
      return;
    }
    if (s.completedRows.length === 0) {
      dispatch({ type: 'NEW_GAME' });
      return;
    }
    showAbandonDialog();
  }
}

// =============================================
// ABANDON GAME DIALOG
// Shown when logo is tapped mid-game with ≥1 guess.
// Styled modal — not browser confirm().
// See: spec-codebreaker-winloss-overlay §3.6, §3.10
// =============================================
function showAbandonDialog() {
  if (document.querySelector('.abandon-backdrop')) return;

  const backdrop = document.createElement('div');
  backdrop.className = 'abandon-backdrop';
  backdrop.setAttribute('role', 'dialog');
  backdrop.setAttribute('aria-modal', 'true');
  backdrop.setAttribute('aria-label', 'Abandon game?');
  backdrop.innerHTML = `
    <div class="abandon-card">
      <div class="abandon-title">Abandon game?</div>
      <div class="abandon-body">Your current progress will be lost.</div>
      <div class="abandon-actions">
        <button class="abandon-cancel-btn" id="abandonCancel">Keep Playing</button>
        <button class="abandon-leave-btn" id="abandonLeave">Leave</button>
      </div>
    </div>`;

  const close = () => {
    backdrop.remove();
    document.removeEventListener('keydown', escHandler);
    document.querySelector('button.game-title')?.focus();
  };

  backdrop.querySelector('#abandonCancel').addEventListener('click', close);
  backdrop.querySelector('#abandonLeave').addEventListener('click', () => {
    // spec-codebreaker-posthog: game_abandoned — fires when player confirms leaving mid-game
    const s = state;
    posthog.capture('game_abandoned', {
      mode: s.settings.gameMode === 'daily' ? 'daily' : s.settings.gameMode === 'single' ? 'single' : 'two_player',
      attempt_number: s.attemptNumber,
      max_attempts: s.settings.maxAttempts
    });
    backdrop.remove();
    document.removeEventListener('keydown', escHandler);
    dispatch({ type: 'NEW_GAME' });
  });

  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) close(); });

  const escHandler = (e) => {
    if (e.key === 'Escape') { close(); return; }
    if (e.key === 'Tab') {
      const btns = [backdrop.querySelector('#abandonCancel'), backdrop.querySelector('#abandonLeave')];
      const idx = btns.indexOf(document.activeElement);
      e.preventDefault();
      btns[(idx + (e.shiftKey ? -1 : 1) + 2) % 2].focus();
    }
  };
  document.addEventListener('keydown', escHandler);

  document.body.appendChild(backdrop);
  backdrop.querySelector('#abandonLeave').focus();
}

// =============================================
// SHAREABLE RESULT CARD
// =============================================
// Pure function: generates share text from game state.
// Intentionally receives only feedback data (no guess colors, no secret code).
// See: spec-codebreaker-shareable §6
function generateShareText(completedRows, status, puzzleNumber, dailyGameMode, maxAttempts, dailyPuzzleDate) {
  // Header — includes formatted date with · separators
  // See: spec-codebreaker-share-date
  const modeLabel = dailyGameMode === 'dup' ? 'Duplicates' : 'No Duplicates';
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateParts = dailyPuzzleDate.split('-');
  const dateLabel = `${monthNames[Number(dateParts[1]) - 1]} ${Number(dateParts[2])}`;
  const header = `CodeBreaker 🔐 #${puzzleNumber} · ${dateLabel} · ${modeLabel}`;

  // Outcome line — uses shared emoji scale (spec-codebreaker-winloss-overlay §3.4)
  const outcomeEmoji = getOutcomeEmoji(completedRows.length, status);
  const outcome = status === 'lost'
    ? `Code unbroken ${outcomeEmoji}`
    : `Cracked it in ${completedRows.length}/${maxAttempts} ${outcomeEmoji}`;

  // Indicator grid — only reads feedback, never guess colors
  const grid = completedRows.map(row => {
    const { black, white } = row.feedback;
    const misses = 4 - black - white;
    const indicators = [];
    for (let i = 0; i < black; i++) indicators.push('⚫');
    for (let i = 0; i < white; i++) indicators.push('⚪');
    for (let i = 0; i < misses; i++) indicators.push('⭕');
    return indicators.join(' ');
  }).join('\n');

  // Footer — /try redirects to /?utm_source=share (spec-codebreaker-posthog §3.3)
  const footer = 'Your turn 👉 www.breakthecode.app/try';

  return `${header}\n${outcome}\n\n${grid}\n\n${footer}`;
}

async function handleShare() {
  const s = state;
  const shareText = generateShareText(
    s.completedRows,
    s.status,
    s.puzzleNumber,
    s.settings.dailyGameMode,
    s.settings.maxAttempts,
    s.settings.dailyPuzzleDate || getTodayDateString()
  );

  // spec-codebreaker-posthog: share_tapped — fires on intent regardless of outcome
  posthog.capture('share_tapped', {
    outcome: s.status,
    attempts: s.completedRows.length,
    puzzle_number: s.puzzleNumber,
    puzzle_date: s.settings.dailyPuzzleDate || getTodayDateString()
  });

  // Try Web Share API first (mobile + supported desktop)
  if (navigator.share) {
    try {
      await navigator.share({ title: 'CodeBreaker', text: shareText });
      // spec-codebreaker-posthog: share_completed (native)
      posthog.capture('share_completed', { method: 'native' });
      return; // Success — OS share sheet handled it
    } catch (err) {
      // User cancelled or share failed — fall through to clipboard
      if (err.name === 'AbortError') return; // User cancelled, do nothing
    }
  }

  // Fallback: clipboard copy
  try {
    await navigator.clipboard.writeText(shareText);
    // spec-codebreaker-posthog: share_completed (clipboard)
    posthog.capture('share_completed', { method: 'clipboard' });
    showShareToast('✅ Result copied to clipboard');
    return;
  } catch (err) {
    // Clipboard failed — show manual copy modal
  }

  // Double-fallback: manual copy modal
  // spec-codebreaker-posthog: share_completed (modal) — fired when modal is shown;
  // actual copy action in the modal is not separately tracked
  posthog.capture('share_completed', { method: 'modal' });
  showShareModal(shareText);
}

function showShareToast(message) {
  // Remove any existing toast
  const existing = document.querySelector('.share-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'share-toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2200);
}

function showShareModal(text) {
  const modal = document.createElement('div');
  modal.className = 'share-modal-overlay';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `<div class="share-modal">
    <div class="share-modal-title">Copy and paste this anywhere:</div>
    <textarea readonly onclick="this.select()">${text}</textarea>
    <button class="share-modal-close" onclick="this.closest('.share-modal-overlay').remove()">Close</button>
  </div>`;
  document.body.appendChild(modal);
  // Auto-select the text
  setTimeout(() => {
    const ta = modal.querySelector('textarea');
    if (ta) { ta.focus(); ta.select(); }
  }, 50);
}

function pegColorStyle(colorId) {
  return `background: var(--color-${colorId});`;
}

function buildPegVisual(colorId, stateClass, patternClass, addGloss) {
  const gloss = addGloss ? `<div class="peg-gloss"></div>` : '';
  const pattern = patternClass ? `<div class="peg-pattern ${patternClass}"></div>` : '';
  const style = colorId ? `style="${pegColorStyle(colorId)}"` : '';
  return `<div class="peg-visual ${stateClass}" ${style}>${pattern}${gloss}</div>`;
}

function getPatternClass(colorId) {
  return colorId ? `pattern-${colorId}` : '';
}

function buildPegSlot(colorId, slotState, idx, isActive) {
  const filled = colorId !== null;
  const patternClass = filled ? getPatternClass(colorId) : '';
  const stateClass = filled ? 'state-filled' : 'state-empty';
  const lockedClass = (!isActive) ? 'locked' : '';
  const ring = (isActive && slotState === 'selected') ? `<div class="peg-ring"></div>` : '';
  const ariaLabel = filled
    ? (isActive ? `Slot ${idx+1}, ${COLOR_NAMES[colorId]}. Tap to clear.` : `Slot ${idx+1}, ${COLOR_NAMES[colorId]}`)
    : `Slot ${idx+1}, empty. Tap to select.`;
  const pegHtml = buildPegVisual(colorId, stateClass, patternClass, filled);
  return `<div class="peg-slot-wrap ${lockedClass}" data-idx="${idx}" role="button" tabindex="${isActive ? 0 : -1}" aria-label="${ariaLabel}" ${isActive ? 'onclick="handleSlotTap('+idx+')"' : ''}>${ring}${pegHtml}</div>`;
}

function buildFeedbackPanel(feedback, animating) {
  if (!feedback) {
    return `<div class="feedback-panel"><div class="feedback-grid">${[0,1,2,3].map(() => `<div class="fb-peg fb-empty"></div>`).join('')}</div></div>`;
  }
  const pegs = [];
  for (let i = 0; i < feedback.black; i++) pegs.push('black');
  for (let i = 0; i < feedback.white; i++) pegs.push('white');
  while (pegs.length < 4) pegs.push('empty');
  const ariaLabel = `${feedback.black} black pegs, ${feedback.white} white pegs`;
  const html = pegs.map((p, i) => {
    const delay = animating ? `style="animation-delay:${i*80}ms"` : '';
    return `<div class="fb-peg fb-${p} ${animating ? 'animating' : ''}" ${delay}></div>`;
  }).join('');
  return `<div class="feedback-panel" aria-label="${ariaLabel}" role="img"><div class="feedback-grid">${html}</div></div>`;
}

function buildGuessRow(rowIndex, rowState, slots, feedback, selectedSlotIndex) {
  const isActive = rowState === 'active';
  const activeClass = isActive ? 'active-row' : '';
  const slotsHtml = slots.map((colorId, i) => {
    const slotState = isActive && selectedSlotIndex === i ? 'selected' : 'normal';
    return buildPegSlot(colorId, slotState, i, isActive);
  }).join('');
  const fbHtml = buildFeedbackPanel(feedback, false);
  return `<div class="guess-row state-${rowState} ${activeClass}" data-row="${rowIndex}">
    <div class="row-number">${rowIndex + 1}</div>
    <div class="row-slots">${slotsHtml}</div>
    ${fbHtml}
  </div>`;
}

function renderGameScreen(s) {
  const { status, settings, secretCode, completedRows, activeRow, attemptNumber } = s;
  const isPlaying = status === 'in-progress';
  const revealed = status === 'won' || status === 'lost';

  // Secret code panel
  const secretSlots = (secretCode || [null,null,null,null]).map((cid, i) => {
    const filled = cid !== null;
    const patternClass = filled ? getPatternClass(cid) : '';
    const style = filled ? `style="${pegColorStyle(cid)}"` : '';
    const pattern = patternClass ? `<div class="peg-pattern ${patternClass}"></div>` : '';
    const gloss = filled ? `<div class="peg-gloss"></div>` : '';
    const maskHtml = !revealed ? `<div class="secret-slot-mask"><div class="secret-mask-circle"></div></div>` : '';
    return `<div class="secret-slot-wrap">
      ${maskHtml}
      <div class="peg-visual state-filled" ${style} style="${filled ? pegColorStyle(cid) : 'background:var(--slot-empty-fill);border:1.5px solid var(--slot-empty-border);box-shadow:var(--shadow-slot-inset);'}">
        ${pattern}${gloss}
      </div>
    </div>`;
  }).join('');
  const secretAriaLabel = revealed && secretCode
    ? `Secret code: ${secretCode.map(c => COLOR_NAMES[c]).join(', ')}`
    : 'Secret code, hidden';
  const secretPanel = `<div class="secret-panel" aria-label="${secretAriaLabel}">
    <div class="secret-label">Secret</div>
    <div class="secret-slots">${secretSlots}</div>
  </div>`;

  // Build rows
  const rows = [];
  for (let i = 0; i < settings.maxAttempts; i++) {
    if (i < completedRows.length) {
      const r = completedRows[i];
      rows.push(buildGuessRow(i, 'completed', r.guess, r.feedback, null));
    } else if (i === completedRows.length && isPlaying) {
      rows.push(buildGuessRow(i, 'active', activeRow.slots, null, activeRow.selectedSlotIndex));
    } else {
      rows.push(buildGuessRow(i, 'empty', [null,null,null,null], null, null));
    }
  }

  // End overlay (inline fallback — visible below board after modal is dismissed)
  // Restyled to match result modal card. See: spec-codebreaker-winloss-overlay §3.1
  let endOverlay = '';
  if (status === 'won' || status === 'lost') {
    const isWin = status === 'won';
    const emoji = getOutcomeEmoji(completedRows.length, status);
    let msg;
    if (settings.gameMode === 'daily') {
      msg = isWin ? `Daily #${s.puzzleNumber} solved in ${completedRows.length} attempt${completedRows.length===1?'':'s'}!` : `Daily #${s.puzzleNumber} not cracked.`;
    } else if (settings.gameMode === 'single') {
      msg = isWin ? `Solved in ${completedRows.length} attempt${completedRows.length===1?'':'s'}!` : 'The code was not cracked.';
    } else {
      msg = isWin ? 'The codebreaker wins!' : 'The codemaker wins!';
    }
    endOverlay = `<div class="end-overlay" style="margin-bottom:calc(var(--controls-height) + 16px)">
      <div class="end-overlay-emoji" aria-hidden="true">${emoji}</div>
      <div class="end-result ${isWin?'won':'lost'}">${msg}</div>
      ${settings.gameMode === 'daily' ? `<button class="share-btn" onclick="handleShare()" aria-label="Share my result"><span class="share-icon">↑</span> ${typeof navigator !== 'undefined' && navigator.share ? 'Share My Result' : 'Copy My Result'}</button>` : ''}
      <button class="end-new-btn" onclick="dispatch({type:'NEW_GAME'})">New Game</button>
    </div>`;
  }

  // Controls
  let controls = '';
  if (isPlaying) {
    const available = getAvailableColors(activeRow.slots, effectiveAllowDuplicates(settings));
    const paletteHtml = COLOR_IDS.map(cid => {
      const avail = available.includes(cid);
      return `<div class="palette-peg-wrap ${avail?'':'unavailable'}" onclick="dispatch({type:'PLACE_COLOR',payload:{colorId:${cid}}})"
        role="button" tabindex="${avail?0:-1}"
        aria-label="${avail?'Place '+COLOR_NAMES[cid]:'Place '+COLOR_NAMES[cid]+', already used'}">
        <div class="palette-peg-visual" style="${pegColorStyle(cid)}">
          <div class="peg-pattern ${getPatternClass(cid)}"></div>
          <div class="peg-gloss"></div>
        </div>
      </div>`;
    }).join('');
    const submitReady = isRowComplete(activeRow.slots);
    controls = `<div class="bottom-controls">
      <div class="palette-row">${paletteHtml}</div>
      <div class="action-row">
        <button class="clear-btn" onclick="dispatch({type:'CLEAR_ROW'})">Clear</button>
        <button class="submit-btn" ${submitReady?'':'disabled'} onclick="dispatch({type:'SUBMIT_GUESS'})"
          aria-label="${submitReady?'Submit guess':'Submit guess, fill all slots first'}">Submit</button>
      </div>
    </div>`;
  }

  const counterHtml = (isPlaying && settings.showAttemptCounter)
    ? `<div class="attempt-counter">Attempt ${attemptNumber} of ${settings.maxAttempts}</div>`
    : (settings.gameMode === 'daily' && s.puzzleNumber !== null)
    ? `<div class="attempt-counter" style="font-weight:600;color:var(--color-accent);">Daily #${s.puzzleNumber}</div>`
    : '<div></div>';

  const tooltipHtml = buildTooltipHTML();

  return `<div class="screen game-screen">
    ${tooltipHtml}
    <div class="game-header">
      <div class="game-title-wrap">
        <button class="game-title" onclick="handleLogoNav()" aria-label="Return to settings">CodeBreaker</button>
        <button class="help-btn" onclick="openTooltip()" aria-label="How to play">?</button>
      </div>
      ${counterHtml}
    </div>
    ${secretPanel}
    <div class="board-area" id="boardArea">
      <div class="board">
        ${rows.join('')}
        ${endOverlay}
      </div>
    </div>
    ${controls}
  </div>`;
}
